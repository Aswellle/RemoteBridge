name: Release

# 推送 v* 格式的 tag 时触发（如 git tag v1.0.0 && git push --tags）
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # 创建 GitHub Release + 上传安装包 assets

jobs:
  release:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            eb_flag: --win
          - os: macos-13        # Intel x64；macos-latest 已是 arm64 需额外处理
            eb_flag: --mac
            extra_eb_args: --arch x64
          - os: ubuntu-latest
            eb_flag: --linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @remotebridge/shared build

      # Linux 需要 native 编译工具链
      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3 make g++

      # macOS / Linux 各需重编译适配本平台的 Electron native 二进制。
      # Windows 直接使用已提交至 .cache/ 的预编译版本（Electron 28 x64）。
      - name: Rebuild better-sqlite3 for Electron (macOS / Linux)
        if: runner.os != 'Windows'
        working-directory: apps/desktop
        run: |
          npx @electron/rebuild@^3 -f -w better-sqlite3
          node -e "
          const f=require('fs'),p=require('path');
          const src=p.resolve('node_modules/better-sqlite3/build/Release/better_sqlite3.node');
          const dst=p.resolve('../../.cache/better_sqlite3.electron.node');
          f.mkdirSync(p.dirname(dst),{recursive:true});
          f.copyFileSync(src,dst);
          console.log('Copied',f.statSync(dst).size,'bytes to',dst);
          "

      # electron-vite build 生成 dist/main、dist/preload、dist/renderer
      - name: Build Vite bundles
        run: pnpm --filter @remotebridge/desktop exec electron-vite build

      # electron-builder 打包并通过 GH_TOKEN 发布到 GitHub Releases
      - name: Package & publish to GitHub Releases
        working-directory: apps/desktop
        run: npx electron-builder ${{ matrix.eb_flag }} ${{ matrix.extra_eb_args }} --config=electron-builder.config.js --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 跳过代码签名（无证书时 CI 构建不报错）
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
