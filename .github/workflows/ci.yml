name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # CH1: audit 改为 --audit-level=high，高危/严重漏洞时中断构建；
      # 低/中危误报通过 .auditrc / overrides 处理，不再全局静默。
      - name: Audit dependencies
        run: pnpm audit --prod --audit-level=high

      # apps/server, apps/web and apps/desktop all import @remotebridge/shared
      # from its compiled dist/, so it must be built before anything else.
      - name: Build shared package
        run: pnpm --filter @remotebridge/shared build

      - name: Build all packages
        run: pnpm build

      # CH2: 明确构建 desktop 包，确保 electron-vite 打包错误在 CI 中可见
      - name: Build desktop package
        run: pnpm --filter @remotebridge/desktop build

      - name: Lint web
        run: pnpm --filter @remotebridge/web lint

      - name: Typecheck
        run: |
          pnpm --filter @remotebridge/shared exec tsc --noEmit
          pnpm --filter @remotebridge/server exec tsc --noEmit
          pnpm --filter @remotebridge/desktop exec tsc --noEmit
          pnpm --filter @remotebridge/web exec tsc --noEmit

      # CD-H1: coverage threshold gate — statements ≥70%, branches ≥60%, etc.
      # Thresholds are configured in packages/shared/vitest.config.ts.
      - name: Test shared (with coverage)
        run: pnpm --filter @remotebridge/shared exec vitest run --coverage

      # P1-15: vitest globalSetup spawns its own relay on :3099, so this
      # works standalone with no live relay required.
      - name: Test server
        run: pnpm --filter @remotebridge/server test

      - name: Test desktop
        run: pnpm --filter @remotebridge/desktop test

      - name: Test web
        run: pnpm --filter @remotebridge/web test

  # CD-M1: Windows runner validates Windows-specific path blacklists
  # (path-guard.ts has OS-specific blocked dirs) and exercises the
  # desktop test suite end-to-end on the target deployment platform.
  test-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @remotebridge/shared build

      - name: Test desktop (Windows)
        run: pnpm --filter @remotebridge/desktop test
